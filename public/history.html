<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史记录 - AI UI 设计生成平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            accent: '#06b6d4',
          },
        },
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-md">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <i class="fa fa-paint-brush text-primary text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-800">AI UI 设计生成平台</h1>
      </div>
      <div class="flex items-center space-x-4">
        <span id="user-info" class="text-sm text-gray-600">
          <span id="nickname"></span> | 剩余次数: <span id="remain"></span>
        </span>
        <a href="/" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors">
          首页
        </a>
        <a href="/pay" class="px-4 py-2 bg-secondary text-white rounded-md hover:bg-secondary/90 transition-colors">
          充值
        </a>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="container mx-auto px-4 py-8">
    <h2 class="text-2xl font-bold mb-6">历史记录</h2>
    
    <div class="bg-white rounded-lg shadow-md p-6">
      <div id="loading" class="py-12 text-center">
        <i class="fa fa-spinner fa-spin text-2xl text-gray-400"></i>
        <p class="mt-2 text-gray-500">加载中...</p>
      </div>
      
      <div id="empty-state" class="py-12 text-center hidden">
        <i class="fa fa-history text-4xl text-gray-400 mb-4"></i>
        <p class="text-gray-500">暂无历史记录</p>
      </div>
      
      <div id="history-list" class="space-y-6 hidden">
        <!-- 历史记录项将通过JavaScript动态生成 -->
      </div>
    </div>
  </main>

  <!-- 预览模态框 -->
  <div id="preview-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-4xl w-full max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">设计预览</h3>
        <button id="close-preview" class="text-gray-400 hover:text-gray-600">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div id="preview-content" class="bg-gray-100 p-4 rounded-md"></div>
      <div class="mt-4 flex justify-end space-x-2">
        <button id="export-history-html" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors">
          导出 HTML
        </button>
        <button id="open-history-figma" class="px-4 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 transition-colors">
          在Figma中打开
        </button>
      </div>
    </div>
  </div>

  <!-- 底部信息 -->
  <footer class="bg-white border-t border-gray-200 mt-8 py-4">
    <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
      <p>AI UI 设计生成平台 - 基于豆包AI的智能设计工具</p>
    </div>
  </footer>

  <script>
    // 全局变量
    let currentHtml = '';

    // DOM 元素
    const elements = {
      nickname: document.getElementById('nickname'),
      remain: document.getElementById('remain'),
      loading: document.getElementById('loading'),
      emptyState: document.getElementById('empty-state'),
      historyList: document.getElementById('history-list'),
      previewModal: document.getElementById('preview-modal'),
      closePreview: document.getElementById('close-preview'),
      previewContent: document.getElementById('preview-content'),
      exportHistoryHtml: document.getElementById('export-history-html'),
      openHistoryFigma: document.getElementById('open-history-figma')
    };

    // 初始化
    function init() {
      getUserInfo();
      getHistory();
      bindEvents();
    }

    // 获取用户信息
    function getUserInfo() {
      fetch('/api/user/info')
      .then(res => res.json())
      .then(data => {
        if (data.code === 0) {
          elements.nickname.textContent = data.data.nickname;
          elements.remain.textContent = data.data.remain;
        }
      })
      .catch(err => {
        console.error('获取用户信息失败:', err);
      });
    }

    // 获取历史记录
    function getHistory() {
      fetch('/api/user/history')
      .then(res => res.json())
      .then(data => {
        elements.loading.classList.add('hidden');
        if (data.code === 0) {
          if (data.data.length === 0) {
            elements.emptyState.classList.remove('hidden');
          } else {
            elements.historyList.classList.remove('hidden');
            renderHistory(data.data);
          }
        } else {
          alert(data.msg);
          elements.emptyState.classList.remove('hidden');
        }
      })
      .catch(err => {
        console.error('获取历史记录失败:', err);
        elements.loading.classList.add('hidden');
        elements.emptyState.classList.remove('hidden');
      });
    }

    // 渲染历史记录
    function renderHistory(history) {
      elements.historyList.innerHTML = '';
      history.forEach((item, index) => {
        const historyItem = document.createElement('div');
        historyItem.className = 'border rounded-lg p-4 hover:shadow-md transition-shadow';
        historyItem.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <h3 class="font-semibold">设计 ${index + 1}</h3>
            <span class="text-sm text-gray-500">${item.time}</span>
          </div>
          <p class="text-gray-600 mb-4 line-clamp-2">${item.prompt}</p>
          <div class="flex justify-end space-x-2">
            <button class="px-3 py-1 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors text-sm preview-btn" data-html="${encodeURIComponent(item.html)}">
              预览
            </button>
            <a href="/api/export/html?html=${encodeURIComponent(item.html)}" class="px-3 py-1 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors text-sm">
              导出
            </a>
          </div>
        `;
        elements.historyList.appendChild(historyItem);
      });

      // 绑定预览按钮事件
      document.querySelectorAll('.preview-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const html = decodeURIComponent(btn.dataset.html);
          currentHtml = html;
          elements.previewContent.innerHTML = html;
          elements.previewModal.classList.remove('hidden');
        });
      });
    }

    // 绑定事件
    function bindEvents() {
      // 关闭预览模态框
      elements.closePreview.addEventListener('click', () => {
        elements.previewModal.classList.add('hidden');
      });

      // 导出 HTML
      elements.exportHistoryHtml.addEventListener('click', () => {
        window.location.href = `/api/export/html?html=${encodeURIComponent(currentHtml)}`;
      });

      // 在Figma中打开
      elements.openHistoryFigma.addEventListener('click', () => {
        alert('正在打开Figma...');
      });
    }

    // 初始化
    init();
  </script>
</body>
</html>
