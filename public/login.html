<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - AI UI 设计生成平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            accent: '#06b6d4',
          },
        },
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
    <div class="text-center mb-8">
      <div class="flex items-center justify-center mb-4">
        <i class="fa fa-paint-brush text-primary text-4xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">AI UI 设计生成平台</h1>
      <p class="text-gray-600 mt-2">登录以使用AI设计生成功能</p>
    </div>
    
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">手机号/用户名</label>
        <input type="text" id="login-phone" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">验证码</label>
        <div class="flex space-x-2">
          <input type="text" id="login-code" class="flex-1 px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
          <button id="send-code" class="px-4 py-3 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors whitespace-nowrap">
            发送验证码
          </button>
        </div>
      </div>
      <button id="do-login" class="w-full py-3 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors">
        登录
      </button>
      <div class="text-center text-sm text-gray-500">
        <p class="mb-1">测试账号：13800138000</p>
        <p>验证码：1234</p>
      </div>
    </div>
  </div>

  <script>
    // DOM 元素
    const elements = {
      loginPhone: document.getElementById('login-phone'),
      loginCode: document.getElementById('login-code'),
      sendCode: document.getElementById('send-code'),
      doLogin: document.getElementById('do-login')
    };

    // 绑定事件
    function bindEvents() {
      // 发送验证码
      elements.sendCode.addEventListener('click', () => {
        // 模拟发送验证码
        alert('验证码已发送：1234');
      });

      // 登录
      elements.doLogin.addEventListener('click', () => {
        const phone = elements.loginPhone.value;
        const code = elements.loginCode.value;

        if (!phone || !code) {
          alert('请输入手机号和验证码');
          return;
        }

        fetch('/api/login/sms', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ phone, code })
        })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            localStorage.setItem('token', data.token);
            window.location.href = '/';
          } else {
            alert(data.msg);
          }
        })
        .catch(err => {
          console.error('登录失败:', err);
          alert('登录失败，请重试');
        });
      });
    }

    // 初始化
    bindEvents();
  </script>
</body>
</html>
